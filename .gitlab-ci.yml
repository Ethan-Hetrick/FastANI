image: python:3.11

stages:
  - docs

cache:
  paths:
    - .cache/pip

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - pip install -r requirements-docs.txt

docs:
  stage: docs
  script:
    - cp README.md docs/index.md
    - python3 - <<'PY'
from pathlib import Path
path = Path("docs/index.md")
text = path.read_text()
text = text.replace('src="docs/images/comparison.jpg"', 'src="images/comparison.jpg"')
path.write_text(text)
PY
    - cp INSTALL.txt docs/INSTALL.txt
    - cp LICENSE docs/LICENSE
    - mkdir -p docs/images
    - cp -r images/. docs/images/
    - mkdir -p docs/tests
    - cp -r tests/data docs/tests/data
    - mkdocs build --strict
  artifacts:
    paths:
      - site
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH"

pages:
  stage: docs
  script:
    - cp README.md docs/index.md
    - python3 - <<'PY'
from pathlib import Path
path = Path("docs/index.md")
text = path.read_text()
text = text.replace('src="docs/images/comparison.jpg"', 'src="images/comparison.jpg"')
path.write_text(text)
PY
    - cp INSTALL.txt docs/INSTALL.txt
    - cp LICENSE docs/LICENSE
    - mkdir -p docs/images
    - cp -r images/. docs/images/
    - mkdir -p docs/tests
    - cp -r tests/data docs/tests/data
    - mkdocs build --strict
    - mv site public
  artifacts:
    paths:
      - public
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

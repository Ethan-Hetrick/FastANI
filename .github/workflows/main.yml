name: Build with CMake and Test

run-name: Build FastANI with CMake and Test by ${{github.actor}}

on:
  push:
  pull_request:

  # Allows to run this workflow from the Actions tab (w.o. trigger)
  workflow_dispatch:

env:
  # CMake build type (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug

jobs:
  Build-Test:
    permissions: write-all
    # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Patch Catch2 cstdint includes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path("ext/Catch2/src/catch2")
          include = "#include <cstdint>\n"
          fixed_width = re.compile(
              r"\b(?:std::)?u?int(?:8|16|32|64)_t\b"
          )

          for path in root.rglob("*"):
              if path.suffix not in {".hpp", ".cpp", ".h", ".cxx", ".ipp"}:
                  continue

              text = path.read_text()
              if include in text or "<stdint.h>" in text or not fixed_width.search(text):
                  continue

              lines = text.splitlines(keepends=True)
              insert_at = None
              for idx, line in enumerate(lines):
                  if line.startswith("#include "):
                      insert_at = idx + 1

              if insert_at is None:
                  raise RuntimeError(f"No include block found in {path}")

              lines.insert(insert_at, include)
              path.write_text("".join(lines))
          PY
      - name: Install zlib, gsl, cppcheck, lcov, and clang-format
        run: |
          sudo apt-get update
          sudo apt-get install zlib1g-dev libgsl-dev cppcheck lcov clang-format
      - name: Install Prettier
        run: npm install --global prettier
      - name: Check documentation and workflow formatting
        run: scripts/precommit_run_prettier.sh
      - name: Check C/C++ formatting
        run: scripts/precommit_check_clang_format.sh
      # Static Analysis with cppcheck
      - name: cppcheck
        run: cppcheck --enable=all --inconclusive --force --std=c++20 -iext/ -I src/ --output-file=cppcheck_report.txt .
      - name: Upload CPPCheck Report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CPPCheck-Report
          path: ${{github.workspace}}/cppcheck_report.txt
      # Building
      - name: Configure CMake
        #  https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
      # Testing
      - name: Test
        working-directory: ${{github.workspace}}/build
        # https://cmake.org/cmake/help/latest/manual/ctest.1.html
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure
      # Run code coverage
      - name: Run lcov to generate coverage
        working-directory: ${{github.workspace}}/build
        run: make lcov2
      # Uploading to Codecov
      - name: Note skipped Codecov upload
        if: ${{ secrets.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN is not configured for this workflow context; skipping Codecov upload."
      - name: Upload coverage reports to codecov.io
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{github.workspace}}/build/coverage.info
          fail_ci_if_error: false
          verbose: true
      # Uploading to Github Action as artifact
      - name: Upload Coverage Summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Summary
          path: ${{github.workspace}}/build/coverage_list.txt
          retention-days: 5
      - name: Upload CTest failure logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CTest-Logs
          path: |
            ${{github.workspace}}/build/Testing/Temporary/LastTest.log
            ${{github.workspace}}/build/Testing/Temporary/LastTestsFailed.log
          retention-days: 5

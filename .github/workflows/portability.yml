name: Portability Build Check

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install toolchain and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libgsl-dev clang libomp-dev

      - name: Configure CMake
        env:
          CC: ${{ matrix.compiler == 'clang' && 'clang' || 'gcc' }}
          CXX: ${{ matrix.compiler == 'clang' && 'clang++' || 'g++' }}
        run: cmake -S . -B build-${{ matrix.compiler }} -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build-${{ matrix.compiler }} --parallel $(nproc) --target fastANI
